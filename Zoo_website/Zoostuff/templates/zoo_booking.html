{% extends "base.html" %}
{% block content %}
<h2>Book Zoo Visit</h2>
<form method="POST">
    <label>Date:</label><br>
    <input type="date" name="date" required><br>
    <label>Number of People:</label><br>
    <input type="number" name="people" min="1" required><br>
    <button type="submit">Book Now</button>
</form>
{% endblock %}
